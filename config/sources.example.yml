# Copy this file to config/sources.yml before first start.
# Each item in sources is one new-api database connection.
sources:
  - source_id: demo-mysql
    source_name: Demo MySQL
    db_type: mysql
    host: 127.0.0.1
    port: 3306
    user: newapi_stats
    password: change_me
    database: new-api
    charset: utf8mb4
    timezone: Asia/Shanghai
    enabled: true
    readonly: true
    schema_version_hint: ""
    notes: "Example source. Replace host/user/password/database with your own values."

  - source_id: demo-postgres
    source_name: Demo PostgreSQL
    db_type: postgres
    host: 127.0.0.1
    port: 5432
    user: newapi_stats
    password: change_me
    database: new-api
    charset: ""
    timezone: Asia/Shanghai
    enabled: false
    readonly: true
    schema_version_hint: ""
    notes: "PostgreSQL example. Enable it after replacing host/user/password/database."
